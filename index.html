<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ヨガグル｜AIヨガ先生に質問しよう</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background: #fff;
      color: #333;
    }
    .header {
      text-align: center;
      padding: 80px 20px 40px;
    }
    .header h1 {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 12px;
    }
    .header h1 span {
      color: #5bc8c0;
    }
    .header p {
      font-size: 16px;
      color: #888;
      margin-bottom: 40px;
    }
    .chat-wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }
    iframe {
      width: 100%;
      height: 600px;
      border: none;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #aaa;
    }
    .footer a {
      color: #5bc8c0;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧘 <span>ヨガ</span>グル</h1>
    <p>350記事のデータベースから、AIヨガ先生が答えます</p>
  </div>
  <div class="chat-wrap">
    <iframe
      src="https://udify.app/chatbot/9SMzmfv8gWnV9e7V"
      allow="microphone *">
    </iframe>
  </div>
  <div class="footer">
    <a href="https://yogaholic.jp" target="_blank">yogaholic.jp</a> が提供するAIサービスです
  </div>
</body>
</html>
